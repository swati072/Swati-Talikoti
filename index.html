<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spur Gear Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .calculator {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 15px;
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .results {
      margin-top: 20px;
      padding: 15px;
      background: #e9f7ef;
      border: 1px solid #c3e6cb;
      border-radius: 6px;
    }
    .results h2 {
      margin-top: 0;
      color: #2f6f31;
    }
    canvas {
      display: block;
      margin: 20px auto;
      background: #fff;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Spur Gear Calculator</h1>
  <div class="calculator">
    <label for="teeth1">Number of Teeth (Gear 1):</label>
    <input type="number" id="teeth1" placeholder="e.g. 50">

    <label for="teeth2">Number of Teeth (Gear 2):</label>
    <input type="number" id="teeth2" placeholder="e.g. 25">

    <label for="module">Module (mm):</label>
    <input type="number" id="module" placeholder="e.g. 2">

    <button onclick="calculateGear()">Calculate</button>

    <div class="results" id="results" style="display:none;">
      <h2>Results</h2>
      <p id="pitch1"></p>
      <p id="pitch2"></p>
      <p id="centerDistance"></p>
      <p id="addendum"></p>
      <p id="dedendum"></p>
    </div>
  </div>

  <canvas id="gearCanvas" width="600" height="300"></canvas>

  <script>
    function calculateGear() {
      const z1 = parseFloat(document.getElementById('teeth1').value);
      const z2 = parseFloat(document.getElementById('teeth2').value);
      const m = parseFloat(document.getElementById('module').value);

      if (isNaN(z1) || isNaN(z2) || isNaN(m)) {
        alert("Please enter valid numbers!");
        return;
      }

      // Spur gear formulas
      const pitch1 = z1 * m; // Pitch circle diameter of gear 1
      const pitch2 = z2 * m; // Pitch circle diameter of gear 2
      const centerDistance = (pitch1 + pitch2) / 2; // Center distance
      const addendum = m; // Addendum = module
      const dedendum = 1.25 * m; // Dedendum approx = 1.25 * module

      // Display results
      document.getElementById('pitch1').innerText = `Pitch Diameter (Gear 1): ${pitch1.toFixed(2)} mm`;
      document.getElementById('pitch2').innerText = `Pitch Diameter (Gear 2): ${pitch2.toFixed(2)} mm`;
      document.getElementById('centerDistance').innerText = `Center Distance: ${centerDistance.toFixed(2)} mm`;
      document.getElementById('addendum').innerText = `Addendum: ${addendum.toFixed(2)} mm`;
      document.getElementById('dedendum').innerText = `Dedendum: ${dedendum.toFixed(2)} mm`;

      document.getElementById('results').style.display = "block";

      // Draw gears
      drawGears(z1, pitch1, z2, pitch2, centerDistance);
    }

    function drawGears(teeth1, pitch1, teeth2, pitch2, centerDistance) {
      const canvas = document.getElementById('gearCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Scale down diameters for drawing
      const scale = 3; // pixels per mm
      const r1 = (pitch1 / 2) / scale;
      const r2 = (pitch2 / 2) / scale;

      const centerX1 = canvas.width / 2 - centerDistance / (2 * scale);
      const centerY = canvas.height / 2;
      const centerX2 = canvas.width / 2 + centerDistance / (2 * scale);

      // Draw gear 1
      drawGear(ctx, centerX1, centerY, r1, teeth1, "blue");

      // Draw gear 2
      drawGear(ctx, centerX2, centerY, r2, teeth2, "red");
    }

    function drawGear(ctx, cx, cy, radius, teeth, color) {
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
      ctx.stroke();

      // Draw teeth as triangular shapes
      for (let i = 0; i < teeth; i++) {
        const angle = (2 * Math.PI / teeth) * i;
        const nextAngle = angle + (2 * Math.PI / teeth) * 0.5;

        const x1 = cx + radius * Math.cos(angle);
        const y1 = cy + radius * Math.sin(angle);
        const x2 = cx + (radius + 8) * Math.cos(angle + 0.05);
        const y2 = cy + (radius + 8) * Math.sin(angle + 0.05);
        const x3 = cx + radius * Math.cos(nextAngle);
        const y3 = cy + radius * Math.sin(nextAngle);

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x3, y3);
        ctx.closePath();
        ctx.fill();
      }
    }
  </script>
</body>
</html>
